version: '3.8'

services:
  siftly:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siftly
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - siftly-data:/app/data
    labels:
      - "tsdproxy.enable=true"
      - "tsdproxy.name=siftly"
    restart: unless-stopped

  proxy:
    image: alpine:
labels:
      - "tsdproxy.enable=true"
      - "tsdproxy.name=siftly-proxy"
    networks:
      - siftly-net
    restart: unless-stopped

volumes:
  siftly-data:

networks:
  siftly-net:
    external: true

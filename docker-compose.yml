version: '3.8'

services:
  siftly:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siftly
    ports:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - siftly-data:/app/data
    networks:
      - proxy-net
      - dokploy-network
    labels:
      - "tsdproxy.enable=true"
      - "tsdproxy.name=siftly"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  siftly-data:

networks:
  proxy-net:
    external: true
  dokploy-network:
    external: true
